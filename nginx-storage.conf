# Tempelkan blok ini di dalam server block Nginx Anda.
# Sesuaikan path dengan lokasi hosting Anda.

# Untuk file storage (thumbnail, avatar, video)
location /storage/ {
    alias /path/to/your/app/storage/app/public/;
    try_files $uri =404;

    # Cache static files untuk performa
    location ~* \.(jpg|jpeg|png|gif|webp|ico|svg|mp4|webm|ogg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# Untuk avatar (legacy - jika masih ada file di folder lama)
location /uploads/ {
    alias /path/to/your/app/public/uploads/;
    try_files $uri =404;

    location ~* \.(jpg|jpeg|png|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
